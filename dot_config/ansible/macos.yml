---
- name: macOS system configuration
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    # ── Appearance ─────────────────────────────────────────────────────────────
    - name: Dark mode
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleInterfaceStyle
        type: string
        value: Dark

    # ── Dock ───────────────────────────────────────────────────────────────────
    - name: Autohide dock
      community.general.osx_defaults:
        domain: com.apple.dock
        key: autohide
        type: bool
        value: true

    - name: Dock persistent apps
      community.general.osx_defaults:
        domain: com.apple.dock
        key: persistent-apps
        type: array
        value:
          - "<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>/System/Applications/Music.app</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>"
          - "<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>/Applications/Brave Browser.app</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>"
          - "<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>/Applications/Obsidian.app</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>"
          - "<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>/Applications/Ghostty.app</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>"
          - "<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>/Applications/Adobe Lightroom Classic/Adobe Lightroom Classic.app</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>"
          - "<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>/Applications/Blender.app</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>"

    - name: Restart Dock
      ansible.builtin.command: killall Dock
      changed_when: true

    # ── Finder ─────────────────────────────────────────────────────────────────
    - name: Finder column view
      community.general.osx_defaults:
        domain: com.apple.finder
        key: FXPreferredViewStyle
        type: string
        value: clmv

    - name: Show all filename extensions
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleShowAllExtensions
        type: bool
        value: true

    - name: Restart Finder
      ansible.builtin.command: killall Finder
      changed_when: true

    # ── Keyboard ───────────────────────────────────────────────────────────────
    - name: Fast key repeat
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: KeyRepeat
        type: int
        value: 2

    - name: Short initial key repeat delay
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: InitialKeyRepeat
        type: int
        value: 15
